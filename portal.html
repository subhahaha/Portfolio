<div id="auth-container" class="glass-box">
  
  <div id="login-box">
    <h2>Welcome Back</h2>
    <input type="email" id="logEmail" placeholder="Email">
    <input type="password" id="logPassword" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p>Need an account? <a href="#" onclick="showRegister()">Register here</a></p>
  </div>

  <div id="register-box" style="display: none;">
    <h2>Create Account</h2>
    <input type="text" id="regFullName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
    <button onclick="handleRegister()">Register</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
  </div>
</div>

<div id="dashboard" class="glass-box" style="display: none;">
  <h2>Welcome!</h2>
  <button onclick="handleLogout()">Logout</button>
</div>

    
<script src="config.js"></script>
  <script>
   

    // 2. Initialize Firebase and Auth
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 3. Logic functions
   
  

// Function to handle Registration
function handleRegister() {
  const fullName = document.getElementById('regFullName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const confirmPassword = document.getElementById('regConfirmPassword').value;

  // 1. Check if Full Name is empty
  if (fullName.trim() === "") {
    alert("Please enter your full name.");
    return;
  }

  // 2. Password Pattern Validation
  const passwordPattern = /^(?=.*[A-Za-z])(?=.*[!@#$%^&*]).{6,}$/;
  if (!passwordPattern.test(password)) {
    alert("Password must contain at least one letter, one special symbol, and be 6+ characters long.");
    return;
  }

  // 3. Confirm Password Match
  if (password !== confirmPassword) {
    alert("Passwords do not match!");
    return;
  }

  

auth.createUserWithEmailAndPassword(email, password)
  .then(async (userCredential) => {
      // Use 'await' to ensure the request is actually sent
      await userCredential.user.sendEmailVerification();
      
      auth.signOut();
      alert("Registration successful! Check your email for the verification link.");
      showLogin();
  })
  .catch((error) => {
      console.error("Verification error:", error); // Check console for details
      alert("Error: " + error.message);
  });
}

function showDashboard() {
    window.location.href = "index.html";
}

function handleLogin() {
  const email = document.getElementById('logEmail').value;
  const password = document.getElementById('logPassword').value;
  
  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful!");
      showDashboard(); // Call the function to reveal the dashboard
    })
    .catch((error) => alert("Error: " + error.message));
}

function handleLogout() {
  auth.signOut().then(() => {
    alert("Logged out!");
    location.reload(); // Simple way to reset the page
  });
}

// This listener acts as your global Gatekeeper
auth.onAuthStateChanged((user) => {
    if (user) {
        // 1. Google users are pre-verified
        if (user.providerData[0]?.providerId === 'google.com') {
            showDashboard();
            return;
        }

        // 2. Email/Password users MUST be verified
        if (user.emailVerified) {
            showDashboard();
        } else {
            // Optional: If they are not verified, log them out and alert them
            auth.signOut();
            alert("Please verify your email before logging in!");
            showLogin();
        }
    } else {
        // No user is logged in, stay on login/register screen
        console.log("User is logged out");
    }
});

// Update your handleLogin to be much simpler now
function handleLogin() {
    const email = document.getElementById('logEmail').value;
    const password = document.getElementById('logPassword').value;
    
    auth.signInWithEmailAndPassword(email, password)
        .catch((error) => alert("Error: " + error.message));
        // Note: No need to call showDashboard() here anymore! 
        // The onAuthStateChanged listener above will handle it automatically.
}

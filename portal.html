<div id="auth-container" class="glass-box">
  
  <div id="login-box">
    <h2>Welcome Back</h2>
    <input type="email" id="logEmail" placeholder="Email">
    <input type="password" id="logPassword" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p>Need an account? <a href="#" onclick="showRegister()">Register here</a></p>
  </div>

  <div id="register-box" style="display: none;">
    <h2>Create Account</h2>
    <input type="text" id="regFullName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
    <button onclick="handleRegister()">Register</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
  </div>
</div>

<div id="dashboard" class="glass-box" style="display: none;">
  <h2>Welcome!</h2>
  <button onclick="handleLogout()">Logout</button>
</div>

    
<script src="config.js"></script>
  <script>
   

    // 2. Initialize Firebase and Auth
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 3. Logic functions
   
  

// Function to handle Registration
function handleRegister() {
  const fullName = document.getElementById('regFullName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const confirmPassword = document.getElementById('regConfirmPassword').value;

  // 1. Check if Full Name is empty
  if (fullName.trim() === "") {
    alert("Please enter your full name.");
    return;
  }

  // 2. Password Pattern Validation
  const passwordPattern = /^(?=.*[A-Za-z])(?=.*[!@#$%^&*]).{6,}$/;
  if (!passwordPattern.test(password)) {
    alert("Password must contain at least one letter, one special symbol, and be 6+ characters long.");
    return;
  }

  // 3. Confirm Password Match
  if (password !== confirmPassword) {
    alert("Passwords do not match!");
    return;
  }

  // If all pass, proceed to Firebase
  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
        // 1. Send the link
        userCredential.user.sendEmailVerification();
        
        // 2. IMPORTANT: Force logout immediately
        auth.signOut();
        
        alert("Registration successful! Please check your email and click the verification link before logging in.");
        
        // 3. Take them to the login screen
        showLogin();
    })
    .catch((error) => alert("Error: " + error.message));
}

function showLogin() {
  document.getElementById('register-box').style.display = 'none';

function showDashboard() {
  // Instead of hiding divs, we send the user to the portfolio file
  window.location.href = "index.html";
}

function handleLogin() {
  const email = document.getElementById('logEmail').value;
  const password = document.getElementById('logPassword').value;
  
  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful!");
      showDashboard(); // Call the function to reveal the dashboard
    })
    .catch((error) => alert("Error: " + error.message));
}

function handleLogout() {
  auth.signOut().then(() => {
    alert("Logged out!");
    location.reload(); // Simple way to reset the page
  });
